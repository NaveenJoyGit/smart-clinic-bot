{{define "user_row"}}
<tr id="user-row-{{.ID}}">
  <td>{{.Name}}</td>
  <td>{{.Email}}</td>
  <td><span class="badge badge-{{.Role}}">{{.Role}}</span></td>
  <td class="mono">{{deref .ClinicID}}</td>
  <td>{{if .IsActive}}<span class="status-dot active"></span>{{else}}<span class="status-dot inactive"></span>{{end}}</td>
  <td>{{formatNullDate .LastLoginAt}}</td>
  <td>
    {{if .IsActive}}
    <button class="btn-sm outline secondary"
      hx-delete="/dashboard/users/{{.ID}}"
      hx-target="#user-row-{{.ID}}"
      hx-swap="outerHTML"
      hx-confirm="Deactivate this user?">Deactivate</button>
    {{end}}
  </td>
</tr>
{{end}}
