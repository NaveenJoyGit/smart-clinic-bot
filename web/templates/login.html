<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Clinic Admin — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard/static/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-header">
        <div class="login-icon">&#x2695;&#xFE0F;</div>
        <h2>Smart Clinic</h2>
        <p>Sign in to your admin dashboard</p>
      </div>
      {{if .Error}}
      <div class="flash-toast error" style="margin-bottom:1rem;">{{.Error}}</div>
      {{end}}
      <form method="post" action="/dashboard/login">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="admin@clinic.com" required autofocus>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Password" required>
        <button type="submit">Sign in</button>
      </form>
    </div>
  </div>
</body>
</html>
