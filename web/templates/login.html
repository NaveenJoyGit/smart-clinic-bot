<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Clinic Admin — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/dashboard/static/style.css">
</head>
<body>
  <main class="container" style="max-width:420px;padding-top:5rem;">
    <article>
      <header>
        <h2 style="margin:0;text-align:center;">&#x1F3E5; Smart Clinic Admin</h2>
      </header>
      {{if .Error}}
      <div class="flash-toast error" style="margin-bottom:1rem;">{{.Error}}</div>
      {{end}}
      <form method="post" action="/dashboard/login">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="admin@clinic.com" required autofocus>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Password" required>
        <button type="submit" style="width:100%;">Sign in</button>
      </form>
    </article>
  </main>
</body>
</html>
