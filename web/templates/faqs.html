{{define "content"}}
<div class="page-header">
  <h2>FAQs</h2>
</div>

<div class="add-form">
  <h3>Add FAQ</h3>
  <form hx-post="/dashboard/clinics/{{deref .ClinicID}}/faqs"
        hx-target="#faq-table-body"
        hx-swap="afterbegin"
        hx-on:htmx:after-request="if(event.detail.successful) this.reset()">
    <div class="form-row">
      <input type="text" name="category" placeholder="Category" value="general">
      <input type="text" name="question" placeholder="Question" required>
      <textarea name="answer" placeholder="Answer" required></textarea>
    </div>
    <div style="margin-top:0.75rem;">
      <button type="submit" class="btn-sm">Add FAQ</button>
    </div>
  </form>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:120px;">Category</th>
        <th>Question</th>
        <th>Answer</th>
        <th style="width:120px;">Actions</th>
      </tr>
    </thead>
    <tbody id="faq-table-body">
      {{range .Data.FAQs}}
      {{template "faq_row" .}}
      {{end}}
    </tbody>
  </table>
</div>
{{if not .Data.FAQs}}
<div class="empty-state">No FAQs yet. Add one above.</div>
{{end}}
{{end}}
