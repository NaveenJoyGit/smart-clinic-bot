{{define "content"}}
<div class="page-header">
  <h2>Doctors</h2>
</div>

<div class="add-form">
  <h3>Add Doctor</h3>
  <form hx-post="/dashboard/clinics/{{deref .ClinicID}}/doctors"
        hx-target="#doctor-table-body"
        hx-swap="afterbegin"
        hx-on:htmx:after-request="if(event.detail.successful) this.reset()">
    <div class="form-row">
      <input type="text" name="name" placeholder="Doctor name" required>
      <input type="text" name="specialization" placeholder="Specialization">
      <input type="text" name="qualifications" placeholder="Qualifications (comma-separated)">
      <input type="text" name="available_days" placeholder="Available days (e.g. Mon,Wed,Fri)">
      <input type="text" name="languages" placeholder="Languages (e.g. English,Arabic)" value="English">
      <textarea name="bio" placeholder="Bio (optional)"></textarea>
    </div>
    <div style="margin-top:0.75rem;">
      <button type="submit" class="btn-sm">Add Doctor</button>
    </div>
  </form>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Specialization</th>
        <th>Qualifications</th>
        <th>Available Days</th>
        <th>Languages</th>
        <th style="width:120px;">Actions</th>
      </tr>
    </thead>
    <tbody id="doctor-table-body">
      {{range .Data.Doctors}}
      {{template "doctor_row" .}}
      {{end}}
    </tbody>
  </table>
</div>
{{if not .Data.Doctors}}
<div class="empty-state">No doctors yet. Add one above.</div>
{{end}}
{{end}}
